<!DOCTYPE html>
<html>
<head>
<title>Faculty Research Impact Analysis System</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

.header{
background:#2c3e50;
color:white;
padding:20px;
text-align:center;
}

.container{
display:flex;
}

.sidebar{
width:220px;
background:#34495e;
height:100vh;
padding-top:20px;
position:fixed;
}

.sidebar button{
display:block;
width:90%;
margin:10px;
padding:12px;
border:none;
background:#1abc9c;
color:white;
cursor:pointer;
font-size:15px;
}

.content{
margin-left:220px;
padding:30px;
width:100%;
}

.section{
display:none;
width:100%;
}

.dashboard{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-top:20px;
}

.stat{
background:white;
padding:30px;
border-radius:8px;
box-shadow:0 0 5px gray;
text-align:center;
font-size:20px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:20px;
}

th,td{
padding:12px;
border:1px solid #ccc;
text-align:center;
}

input{
padding:10px;
margin:10px;
width:250px;
}

button{
padding:10px 20px;
}

</style>
</head>

<body>

<div class="header">
<h2>Faculty Research Impact Analysis System</h2>
</div>

<div class="container">

<div class="sidebar">

<button onclick="showSection('dashboard')">Dashboard</button>
<button onclick="showSection('faculty')">Existing Faculty</button>
<button onclick="showSection('add')">Add Faculty</button>
<button onclick="showSection('upload')">Upload CSV</button>
<button onclick="showSection('ranking')">Faculty Ranking</button>

</div>


<div class="content">

<div id="dashboard" class="section">

<h2>Dashboard</h2>

<div class="dashboard">

<div class="stat">
<h3>Total Faculty</h3>
<h1 id="totalFaculty">0</h1>
</div>

<div class="stat">
<h3>Total Publications</h3>
<h1 id="totalPub">0</h1>
</div>

<div class="stat">
<h3>Total Citations</h3>
<h1 id="totalCit">0</h1>
</div>

<div class="stat">
<h3>Top Faculty</h3>
<h1 id="topFaculty">-</h1>
</div>

</div>

</div>



<div id="faculty" class="section">

<h2>Existing Faculty</h2>

<table id="facultyTable">

<tr>
<th>Name</th>
<th>Department</th>
<th>Publications</th>
<th>Citations</th>
<th>H-index</th>
<th>Collaboration</th>
</tr>

</table>

</div>



<div id="add" class="section">

<h2>Add Faculty</h2>

<input id="name" placeholder="Faculty Name">
<input id="dept" placeholder="Department">
<input id="pub" placeholder="Publications">
<input id="cit" placeholder="Citations">
<input id="hindex" placeholder="H-index">
<input id="collab" placeholder="Collaboration">

<br>

<button onclick="addFaculty()">Add Faculty</button>

</div>



<div id="upload" class="section">

<h2>Upload CSV</h2>

<input type="file" id="csvFile">

<button onclick="uploadCSV()">Upload</button>

</div>



<div id="ranking" class="section">

<h2>Faculty Ranking</h2>

<button onclick="generateRanking()">Generate Ranking</button>

<table id="rankingTable">

<tr>
<th>Rank</th>
<th>Name</th>
<th>Score</th>
</tr>

</table>

</div>

</div>
</div>


<script>

let facultyData=[

{name:"Dr. Ramesh",dept:"CSE",pub:20,cit:500,hindex:12,collab:5},
{name:"Dr. Sita",dept:"ECE",pub:15,cit:300,hindex:10,collab:3}

];


function showSection(id){

document.querySelectorAll(".section").forEach(sec=>sec.style.display="none");

document.getElementById(id).style.display="block";

}

showSection("dashboard");


function loadFaculty(){

let table=document.getElementById("facultyTable");

table.innerHTML=`
<tr>
<th>Name</th>
<th>Department</th>
<th>Publications</th>
<th>Citations</th>
<th>H-index</th>
<th>Collaboration</th>
</tr>`;

facultyData.forEach(f=>{

table.innerHTML+=`
<tr>
<td>${f.name}</td>
<td>${f.dept}</td>
<td>${f.pub}</td>
<td>${f.cit}</td>
<td>${f.hindex}</td>
<td>${f.collab}</td>
</tr>`;

});

loadDashboard();

}


function loadDashboard(){

document.getElementById("totalFaculty").innerText=facultyData.length;

let totalPub=0;
let totalCit=0;

facultyData.forEach(f=>{
totalPub+=f.pub;
totalCit+=f.cit;
});

document.getElementById("totalPub").innerText=totalPub;
document.getElementById("totalCit").innerText=totalCit;

let ranked=[...facultyData].sort((a,b)=>
(b.pub*2 + b.cit*0.5 + b.hindex*3 + b.collab) -
(a.pub*2 + a.cit*0.5 + a.hindex*3 + a.collab)
);

document.getElementById("topFaculty").innerText=ranked[0].name;

}


function addFaculty(){

let f={
name:name.value,
dept:dept.value,
pub:Number(pub.value),
cit:Number(cit.value),
hindex:Number(hindex.value),
};

facultyData.push(f);

loadFaculty();

alert("Faculty Added");

}


function generateRanking(){

let table=document.getElementById("rankingTable");

table.innerHTML=`
<tr>
<th>Rank</th>
<th>Name</th>
<th>Score</th>
</tr>`;

let ranked=[...facultyData].sort((a,b)=>
(b.pub*2 + b.cit*0.5 + b.hindex*3 + b.collab) -
(a.pub*2 + a.cit*0.5 + a.hindex*3 + a.collab)
);

ranked.forEach((f,i)=>{

let score=(f.pub*2 + f.cit*0.5 + f.hindex*3 + f.collab);

table.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${f.name}</td>
<td>${score}</td>
</tr>`;

});

}


collab:Number(collab.value)
function uploadCSV(){

let file=document.getElementById("csvFile").files[0];

let reader=new FileReader();

reader.onload=function(e){

let rows=e.target.result.split("\n");

rows.forEach(r=>{

let c=r.split(",");

if(c.length>=6){

facultyData.push({

name:c[0],
dept:c[1],
pub:Number(c[2]),
cit:Number(c[3]),
hindex:Number(c[4]),
collab:Number(c[5])

});

}

});

loadFaculty();

};

reader.readAsText(file);

}

loadFaculty();

</script>

</body>
</html>
